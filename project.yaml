version: '4.0'

actions:

  # Extract population by WP
  
  generate_dataset_wp1:
    run: ehrql:v1 generate-dataset analysis/dataset_definition/dataset_definition_wp1.py --output output/dataset_wp1.csv.gz
    outputs:
      highly_sensitive:
        dataset: output/dataset_wp1.csv.gz


  diabetes_algo_via_config:
    run: diabetes-algo:v0.0.6
    config:
      df_input: dataset_wp1.csv.gz
      birth_date: dob
      ethnicity_cat: ethnicity_cat
      df_output: data_processed.csv.gz
    needs:
      - generate_dataset_wp1
    outputs:
      highly_sensitive:
        dataset: output/data_processed.csv.gz

  
