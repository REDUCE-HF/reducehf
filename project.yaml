version: '5.0'

actions:

  # Extract population for consort diagram

  generate_dataset_consort:
    run: ehrql:v1 generate-dataset analysis/dataset_definition/dataset_definition_consort.py --output output/dataset_consort.csv.gz
    outputs:
      highly_sensitive:
        dataset: output/dataset_consort.csv.gz

  consort_diagram:
    run: python:v2 python analysis/preprocessing/consort_diagram.py
    needs: [generate_dataset_consort]
    outputs:
      highly_sensitive:
        dataset: output/consort_diagram_dta.csv


  # Extract population by WP
  #WP1
  generate_dataset_wp1_common:
    run: ehrql:v1 generate-dataset analysis/dataset_definition/dataset_definition_wp1_common.py --output output/tmp_dataset_wp1_common.csv.gz
    outputs:
      highly_sensitive:
        dataset: output/tmp_dataset_wp1_common.csv.gz
# 
  diabetes_algo_wp1:
    run: diabetes-algo:v0.0.9 --output output/dataset_wp1_common.csv.gz
    config:
      df_input: tmp_dataset_wp1_common.csv.gz
      birth_date: dob
      ethnicity_cat: ethnicity_cat
      df_output: dataset_wp1_common.csv.gz
    needs:
      - generate_dataset_wp1_common
    outputs:
      highly_sensitive:
        dataset: output/dataset_wp1_common.csv.gz

  generate_dataset_wp1_2019:
    run: ehrql:v1 generate-dataset analysis/dataset_definition/dataset_definition_wp1_time_dep.py --output output/dataset_wp1_2019.csv.gz
      -- --cohort_index_date "2019-02-01"
    outputs:
      highly_sensitive:
